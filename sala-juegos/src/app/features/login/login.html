<section class="login-container app-page">
  <div class="container">          
    <a routerLink="/home" class="back-home-btn">
      ← Volver
    </a>

    <div class="row justify-content-center align-items-center">
      <div class="col-12 col-md-8 col-lg-5">
        <form class="login-card app-card fade-up">
          <span class="badge badge-app rounded-pill px-3 py-2 mb-3">
            Acceso de jugador
          </span>

          <h2 class="app-title mb-2">
            Iniciar sesión
          </h2>

          <p class="app-subtitle mb-4">
            Ingresá a la sala para jugar, competir y guardar tus resultados.
          </p>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              class="form-control"
              type="email"
              placeholder="Ingresá tu email"
            >
          </div>

          <div class="mb-4">
            <label class="form-label">Contraseña</label>
            <input
              class="form-control"
              type="password"
              placeholder="Ingresá tu contraseña"
            >
          </div>

          <button
            class="btn btn-app-primary w-100 py-2 mb-3"
            type="button"
          >
            Ingresar
          </button>

          <p class="auth-link mb-0 text-center">
            ¿No tenés cuenta?
            <a routerLink="/register">Registrate</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</section>
