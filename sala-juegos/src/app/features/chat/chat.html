<section class="chat-container">
  <div class="chat-card">
    <a routerLink="/home" class="back-link">← Volver al Home</a>

    <h1>Chat global</h1>

    <p class="description">
      Sala única para usuarios logueados. Los mensajes se actualizan en tiempo real.
    </p>

    <div *ngIf="loading" class="loading">
      Cargando mensajes...
    </div>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <div class="messages" *ngIf="!loading">
      <div
        *ngFor="let message of messages"
        class="message"
        [class.own-message]="isOwnMessage(message)"
      >
        <div class="message-header">
          <strong>{{ message.nombre_usuario }}</strong>
          <span>{{ formatDate(message.created_at) }}</span>
        </div>

        <p>{{ message.mensaje }}</p>
      </div>
    </div>

    <form class="chat-form" (ngSubmit)="sendMessage()">
      <input
        type="text"
        name="newMessage"
        [(ngModel)]="newMessage"
        placeholder="Escribí un mensaje..."
        maxlength="250"
      >

      <button type="submit" [disabled]="sending || !newMessage.trim()">
        {{ sending ? 'Enviando...' : 'Enviar' }}
      </button>
    </form>
  </div>
</section>
