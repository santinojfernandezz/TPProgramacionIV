<section class="register-container">
  <form class="register-card">
    <h2>Registro</h2>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Ingresá tu email">
    </div>

    <div class="form-group">
      <label>Nombre</label>
      <input type="text" placeholder="Ingresá tu nombre">
    </div>

    <div class="form-group">
      <label>Apellido</label>
      <input type="text" placeholder="Ingresá tu apellido">
    </div>

    <div class="form-group">
      <label>Edad</label>
      <input type="number" placeholder="Ingresá tu edad">
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" placeholder="Ingresá tu contraseña">
    </div>

    <button type="button">Registrarse</button>

    <p>
      ¿Ya tenés cuenta?
      <a routerLink="/login">Iniciá sesión</a>
    </p>
  </form>
</section>
