<section class="register-container app-page">
  <div class="container">
    <a routerLink="/home" class="back-home-btn">
      ← Volver
    </a>
    <div class="row justify-content-center align-items-center">
      <div class="col-12 col-md-9 col-lg-6">
        <form class="register-card app-card fade-up">
          <span class="badge badge-app rounded-pill px-3 py-2 mb-3">
            Nuevo jugador
          </span>

          <h2 class="app-title mb-2">
            Registro
          </h2>

          <p class="app-subtitle mb-4">
            Creá tu cuenta para ingresar a la sala y participar de los juegos.
          </p>

          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Email</label>
              <input
                class="form-control"
                type="email"
                placeholder="Ingresá tu email"
              >
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Nombre</label>
              <input
                class="form-control"
                type="text"
                placeholder="Ingresá tu nombre"
              >
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Apellido</label>
              <input
                class="form-control"
                type="text"
                placeholder="Ingresá tu apellido"
              >
            </div>

            <div class="col-12">
              <label class="form-label">Edad</label>
              <input
                class="form-control"
                type="number"
                placeholder="Ingresá tu edad"
              >
            </div>

            <div class="col-12">
              <label class="form-label">Contraseña</label>
              <input
                class="form-control"
                type="password"
                placeholder="Ingresá tu contraseña"
              >
            </div>
          </div>

          <button
            class="btn btn-app-primary w-100 py-2 mt-4 mb-3"
            type="button"
          >
            Registrarse
          </button>

          <p class="auth-link mb-0 text-center">
            ¿Ya tenés cuenta?
            <a routerLink="/login">Iniciá sesión</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</section>
